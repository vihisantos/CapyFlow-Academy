<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado Pago Checkout - CapyFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Proxima+Nova&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f5f5;
        }

        .mp-blue {
            background-color: #009ee3;
        }

        .mp-blue:hover {
            background-color: #007eb5;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-xl max-w-md w-full">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8 border-b pb-4">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white font-bold">MP
                </div>
                <span class="font-bold text-gray-700">Mercado Pago</span>
            </div>
            <span class="text-xs bg-gray-100 text-gray-500 px-2 py-1 rounded">Ambiente Seguro</span>
        </div>

        <!-- Product -->
        <div class="flex justify-between items-start mb-8">
            <div>
                <h2 class="text-xl font-bold text-gray-800">CapyFlow Academy PRO</h2>
                <p class="text-sm text-gray-500">Acesso Vitalício + Temas</p>
            </div>
            <div class="text-right">
                <div class="text-2xl font-bold text-gray-800">R$ 29,90</div>
            </div>
        </div>

        <!-- Payment Methods -->
        <div class="space-y-3 mb-8">
            <h3 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-2">Escolha como pagar</h3>

            <button onclick="pay()"
                class="w-full flex items-center p-4 border rounded-lg hover:bg-blue-50 transition-colors group">
                <div class="w-6 h-6 mr-3 text-blue-500">❖</div>
                <span class="font-medium text-gray-700 group-hover:text-blue-600">Pix (Aprovação Imediata)</span>
            </button>

            <button onclick="pay()"
                class="w-full flex items-center p-4 border rounded-lg hover:bg-blue-50 transition-colors group">
                <div class="w-6 h-6 mr-3 text-blue-500">💳</div>
                <span class="font-medium text-gray-700 group-hover:text-blue-600">Cartão de Crédito</span>
            </button>
        </div>

        <!-- Footer -->
        <div class="text-center text-xs text-gray-400 mt-8">
            Pagamento processado por Mercado Pago.<br>
            Ambiente Simulado para CapyFlow Academy.
        </div>
    </div>

    <script>
        function pay() {
            // Simulate processing
            const btn = event.currentTarget;
            btn.innerHTML = 'Processando...';
            btn.classList.add('bg-blue-50');

            setTimeout(() => {
                // Determine redirect URL based on environment (GitHub Pages vs Local)
                const isProd = window.location.hostname !== 'localhost';
                const basePath = isProd ? '/CapyFlow-Academy' : '';

                // Redirect back to Dashboard with success
                window.location.href = `${window.location.origin}${basePath}/dashboard?status=approved`;
            }, 1500);
        }
    </script>
</body>

</html>
